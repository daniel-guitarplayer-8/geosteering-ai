name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Sprint O4 (v2.44): + extra `sim` (jax CPU + numba) — backends do
          # simulador, antes não instalados na CI (derrubava geosteering-warmup).
          pip install -e ".[dev,viz,train,hpo,sim]"

      - name: Install xvfb + Qt runtime libs for headless GUI tests
        # Sprint O4 (v2.44): PyQt6.QtGui (importado pelo plugin pytest-qt no
        # pytest_configure, mesmo sem rodar GUI tests) exige libs de sistema
        # EGL/GL/xkbcommon — ausentes no ubuntu-latest. Sem elas o pytest
        # aborta com INTERNALERROR (libEGL.so.1 not found) ANTES de qualquer
        # teste. xvfb continua p/ os GUI tests (QT_QPA_PLATFORM=offscreen).
        run: |
          sudo apt-get update && sudo apt-get install -y \
            xvfb libegl1 libgl1 libxkbcommon0 libdbus-1-3

      # Sprint v2.45: recompila o tatu.x (Fortran) PORTÁVEL para o runner.
      # O binário commitado é compilado localmente (Threadripper Zen4) com
      # -march=native → AVX-512, que dispara SIGILL no runner GitHub (sem
      # AVX-512). O alvo `portable` usa -march=x86-64-v2 (paridade <1e-12
      # preservada). Sem isto, os 12 testes de paridade Fortran falham.
      - name: Build portable tatu.x (Fortran) for CI runner
        run: |
          sudo apt-get install -y gfortran
          make -C Fortran_Gerador portable
          file Fortran_Gerador/tatu.x

      - name: Compile check
        run: python -m compileall geosteering_ai/ -q

      # Sprint v2.34 — isola cold-start JIT/LLVM do tempo medido em benchmarks
      - name: Warm up JIT/LLVM cache (Sprint v2.32+)
        run: geosteering-warmup --verbose
        timeout-minutes: 5

      - name: Run tests (CPU-only)
        run: pytest tests/ -v --tb=short --ignore=tests/test_gpu.py --ignore=tests/test_simulation_manager_gui.py
        env:
          # Sprint v2.45: o gate de warmup (test_warmup_thread_initializes_without
          # _blocking) é timing-sensível; runners GitHub são mais lentos que o
          # dev local. 5s dá folga (default 2s calibrado p/ Mac M2/Threadripper).
          WARMUP_BLOCKING_THRESHOLD_S: "5.0"

      # Sprint v2.33 — testes GUI pytest-qt rodam isolados sob xvfb (headless)
      - name: Run GUI tests (pytest-qt + xvfb)
        run: xvfb-run -a pytest tests/test_simulation_manager_gui.py -v --tb=short
        env:
          QT_QPA_PLATFORM: offscreen
        timeout-minutes: 10
        continue-on-error: true

      # Sprint v2.34 — benchmark smoke (observabilidade, não gating)
      - name: Benchmark smoke (cenário E n=200)
        run: |
          python -m geosteering_ai.cli benchmark --scenario E --n 200 \
            | tee benchmark_ci.log
        timeout-minutes: 10
        continue-on-error: true

      - name: Type check
        run: mypy geosteering_ai/ --ignore-missing-imports
        continue-on-error: true
