# Geosteering AI — Preset: P1 Baseline
# Cenario mais simples: 5 features EM, sem noise, sem GS.
# Util para debugging e baseline de performance.
# Nota: LR=1e-4 e patience=60 sao os defaults S21.
#       Para ref-compat legado, use learning_rate: 1.0e-3 e patience: 20.

use_noise: false
use_curriculum: false
use_dual_validation: false
model_type: "ResNet_18"
loss_type: "rmse"
learning_rate: 1.0e-4
epochs: 400
early_stopping_patience: 60

# ──── tf.data tuning (Sprint v2.40 D6) ──────────────────────────────────
# Substituem hardcodes em DataPipeline.build_tf_dataset.
# Defaults preservam comportamento legado 100% — alterar apenas em Colab.
tf_shuffle_buffer_size: 10000       # buffer shuffle inter-batch (0 = desativar; max 100000)
tf_num_parallel_calls: -1           # -1 = AUTOTUNE em runtime
tf_prefetch_buffer_size: -1         # -1 = AUTOTUNE em runtime
tf_cache_eval: true                 # aplicar .cache() em val/test
